name: booking-watch

on:
  schedule:
    # Every ~10 min, offset off :00/:10 etc. GitHub delays/drops scheduled
    # runs during high load (worst at the top of the hour), so the odd minutes
    # get served more reliably. Runs are still best-effort, not guaranteed.
    - cron: "4,14,24,34,44,54 * * * *"
  workflow_dispatch: {}   # lets you trigger a manual run from the Actions tab

# Allow the workflow to commit the updated state file back to the repo.
permissions:
  contents: write

concurrency:
  group: booking-watch
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot (drain Telegram commands + check requests)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Route through an India egress so BookMyShow doesn't 403 the
          # US-based GitHub runner. Set SCRAPERAPI_KEY (or PROXY_URL) as a secret.
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: python bot.py

      - name: Persist requests store
        run: |
          if [[ -n "$(git status --porcelain requests.json)" ]]; then
            git config user.name "booking-watch-bot"
            git config user.email "actions@users.noreply.github.com"
            git add requests.json
            git commit -m "chore: update booking-watch requests [skip ci]"
            git push
          else
            echo "No request-store change."
          fi
